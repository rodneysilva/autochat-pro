# ==========================================
# AutoChat Pro - Docker Compose
# ==========================================

version: '3.8'

services:
  # ==========================================
  # MongoDB
  # ==========================================
  mongodb:
    image: mongo:7.0
    container_name: autochat-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: autochat_pro
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - autochat-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: autochat-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - autochat-network
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Postfix SMTP Server
  # ==========================================
  postfix:
    build:
      context: ./backend/postfix
      dockerfile: Dockerfile
    container_name: autochat-postfix
    restart: unless-stopped
    ports:
      - "25:25"
      - "587:587"
    environment:
      - MAIL_DOMAIN=rodney.website
      - MAIL_HOSTNAME=mail.rodney.website
    volumes:
      - postfix_data:/var/spool/postfix
      - postfix_certs:/etc/ssl
    networks:
      - autochat-network

  # ==========================================
  # Backend API
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autochat-backend
    restart: unless-stopped
    ports:
      - "8100:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://admin:admin123@mongodb:27017/?authSource=admin
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.pytest_cache
    networks:
      - autochat-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      postfix:
        condition: service_started

  # ==========================================
  # PostgreSQL (Evolution API)
  # ==========================================
  evolution-db:
    image: postgres:16-alpine
    container_name: autochat-evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: evo
      POSTGRES_PASSWORD: evo123
      POSTGRES_DB: evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    networks:
      - autochat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evo -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # Frontend
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autochat-frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.vite
    networks:
      - autochat-network
    depends_on:
      - backend

  # ==========================================
  # Evolution API (WhatsApp)
  # ==========================================
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: autochat-evolution
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - API_KEY=evolution_api_key_secret_change_in_production
      - DATABASE_PROVIDER=postgresql
      - DATABASE_URL=postgresql://evo:evo123@evolution-db:5432/evolution?schema=public
      - DATABASE_CONNECTION_URI=postgresql://evo:evo123@evolution-db:5432/evolution?schema=public
      - DATABASE_CONNECTION_DB_NAME=evolution
      - STORE_MESSAGES=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379/0
    volumes:
      - evolution_data:/evolution/store
    networks:
      - autochat-network
    depends_on:
      evolution-db:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  postfix_data:
    driver: local
  postfix_certs:
    driver: local
  evolution_data:
    driver: local
  evolution_db_data:
    driver: local

networks:
  autochat-network:
    driver: bridge
