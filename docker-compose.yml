# ==========================================
# AutoChat Pro - Docker Compose
# ==========================================
# URLs:
#   Frontend: https://autochat.rodney.website
#   API:      https://autochat.rodney.website/api/v1 (via nginx proxy)
#
# Webhook Telegram:
#   https://autochat.rodney.website/api/v1/telegram/webhook/{bot_token}
#   (nginx proxya /api para o backend automaticamente)
# ==========================================

services:
  # ==========================================
  # MongoDB
  # ==========================================
  mongodb:
    image: mongo:7.0
    container_name: autochat-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-admin123}
      MONGO_INITDB_DATABASE: autochat_pro
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - autochat-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: autochat-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - autochat-network
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Postfix SMTP Server
  # ==========================================
  postfix:
    build:
      context: ./backend/postfix
      dockerfile: Dockerfile
    container_name: autochat-postfix
    restart: unless-stopped
    ports:
      - "25:25"
      - "587:587"
    environment:
      - MAIL_DOMAIN=rodney.website
      - MAIL_HOSTNAME=mail.rodney.website
    volumes:
      - postfix_data:/var/spool/postfix
      - postfix_certs:/etc/ssl
    networks:
      - autochat-network

  # ==========================================
  # Backend API (FastAPI)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autochat-backend
    restart: unless-stopped
    ports:
      - "8100:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-admin123}@mongodb:27017/?authSource=admin
      - REDIS_URL=redis://redis:6379/0
      - HOST=0.0.0.0
      - PORT=8000
      - ENVIRONMENT=production
      - TELEGRAM_WEBHOOK_BASE_URL=https://autochat.rodney.website
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.pytest_cache
    networks:
      - autochat-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      postfix:
        condition: service_started

  # ==========================================
  # PostgreSQL (Evolution API)
  # ==========================================
  evolution-db:
    image: postgres:16-alpine
    container_name: autochat-evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${EVO_DB_USER:-evo}
      POSTGRES_PASSWORD: ${EVO_DB_PASS:-evo123}
      POSTGRES_DB: evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    networks:
      - autochat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evo -d evolution"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # Frontend (React + Vite + Nginx)
  # Nginx faz proxy de /api para o backend
  # WebSocket /ws também é proxyado
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autochat-frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.vite
    networks:
      - autochat-network
    depends_on:
      - backend

  # ==========================================
  # Evolution API (WhatsApp)
  # ==========================================
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: autochat-evolution
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      - SERVER_PORT=8080
      - AUTHENTICATION_TYPE=apikey
      - CACHE_REDIS_ENABLED=false
      - API_KEY=${EVOLUTION_API_KEY:-429683C4C977415CAAFCCE10F7D57E11}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_URL=postgresql://${EVO_DB_USER:-evo}:${EVO_DB_PASS:-evo123}@evolution-db:5432/evolution?schema=public
      - DATABASE_CONNECTION_URI=postgresql://${EVO_DB_USER:-evo}:${EVO_DB_PASS:-evo123}@evolution-db:5432/evolution?schema=public
      - DATABASE_CONNECTION_DB_NAME=evolution
      - STORE_MESSAGES=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
    volumes:
      - evolution_data:/evolution/store
    networks:
      - autochat-network
    depends_on:
      evolution-db:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  postfix_data:
    driver: local
  postfix_certs:
    driver: local
  evolution_data:
    driver: local
  evolution_db_data:
    driver: local

networks:
  autochat-network:
    driver: bridge
